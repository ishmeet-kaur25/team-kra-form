<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRA Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fa;
    --bg-panel: #ffffff;
    --bg-panel-2: #eef1f7;
    --cyan: #0a8fa8;
    --cyan-dim: #4fb8cc;
    --cyan-glow: rgba(10, 143, 168, 0.18);
    --magenta: #d6206e;
    --text: #1c2733;
    --text-dim: #67768a;
    --border: #d8dee8;
    --danger: #d6294a;
    --green: #0e9e6e;
    --green-light: rgba(14,158,110,0.08);
    --red-light: rgba(214,41,74,0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      linear-gradient(rgba(10,143,168,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,143,168,0.05) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 32px 16px 80px;
  }

  .wrap { max-width: 960px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 32px; }

  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 0.04em;
    margin: 0 0 6px;
    color: var(--cyan);
  }

  .sub { color: var(--text-dim); font-size: 13px; }

  .card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 10px rgba(20,30,50,0.06);
  }

  label {
    display: block;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  select {
    width: 100%;
    background: #fbfcfe;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    cursor: pointer;
  }
  select:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(10,143,168,0.12);
  }

  .loading, .empty-msg {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 24px 0;
  }

  .emp-list { display: flex; flex-direction: column; gap: 10px; }

  .emp-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .emp-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    background: var(--bg-panel-2);
  }

  .emp-head-left { display: flex; flex-direction: column; gap: 2px; }

  .emp-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
  }

  .emp-desig { font-size: 12px; color: var(--text-dim); }

  .emp-arrow { color: var(--cyan); font-size: 14px; transition: transform 0.15s; }
  .emp-arrow.open { transform: rotate(180deg); }

  .emp-body {
    padding: 18px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .emp-body.open { display: block; }

  .emp-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }

  .table-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--magenta);
    text-transform: uppercase;
    margin: 0 0 8px;
  }
  .table-title + .table-title,
  .kpi-table + .table-title { margin-top: 20px; }

  .kpi-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .kpi-table th, .kpi-table td {
    border: 1px solid var(--border);
    padding: 8px 10px;
    text-align: left;
    vertical-align: top;
  }
  .kpi-table th {
    background: var(--bg-panel-2);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--cyan);
    text-transform: uppercase;
  }
  .kpi-table td.row-label {
    background: var(--bg-panel-2);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    width: 50px;
  }
  .kpi-table td.empty-cell { color: #a3afc0; }

  /* Accept / Reject cell */
  .decision-cell { min-width: 200px; }

  .btn-group { display: flex; gap: 6px; margin-bottom: 6px; }

  .btn-accept, .btn-reject {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    padding: 5px 10px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-accept {
    background: var(--green);
    color: #fff;
  }
  .btn-reject {
    background: var(--danger);
    color: #fff;
  }
  .btn-accept:hover, .btn-reject:hover { opacity: 0.85; }
  .btn-accept:active, .btn-reject:active { transform: scale(0.97); }
  .btn-accept:disabled, .btn-reject:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-accept.active {
    outline: 2px solid #065c40;
    outline-offset: 1px;
  }
  .btn-reject.active {
    outline: 2px solid #8b0a23;
    outline-offset: 1px;
  }

  .mgr-comment-input {
    width: 100%;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 7px;
    outline: none;
    resize: vertical;
    min-height: 32px;
    color: var(--text);
    background: #fbfcfe;
  }
  .mgr-comment-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px rgba(10,143,168,0.1);
  }

  .save-btn {
    margin-top: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--cyan);
    color: #fff;
    border: none;
    border-radius: 3px;
    padding: 5px 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .decision-status {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }
  .decision-status.accepted { color: var(--green); }
  .decision-status.rejected { color: var(--danger); }
  .decision-status.saving { color: var(--text-dim); }

  tr.row-accepted { background: var(--green-light) !important; }
  tr.row-rejected { background: var(--red-light) !important; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>KRA DASHBOARD</h1>
    <div class="sub">Select a team to view submitted KRAs</div>
  </header>

  <div class="card">
    <label for="teamFilter">Team Name</label>
    <select id="teamFilter">
      <option value="" disabled selected>Select team...</option>
      <option value="HR">HR</option>
      <option value="Finance">Finance</option>
      <option value="Managed Services">Managed Services</option>
      <option value="Japan">Japan</option>
      <option value="US Staffing">US Staffing</option>
      <option value="Professional">Professional</option>
      <option value="Services">Services</option>
      <option value="Product Engineering">Product Engineering</option>
      <option value="Captive">Captive</option>
      <option value="Perm">Perm</option>
      <option value="Sales">Sales</option>
      <option value="Corporate Support">Corporate Support</option>
      <option value="Vendor Management">Vendor Management</option>
    </select>
  </div>

  <div id="results"></div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaPD4ck4GSKtJzndAdxFRfWDz0uisUcwn9GoPxJgphn0y8AjCOoYebx3OJgn17ddRK/exec';

  let allData = [];
  let dataLoaded = false;

  const resultsEl = document.getElementById('results');
  const teamFilter = document.getElementById('teamFilter');

  function escapeHtml(str) {
    if (str === undefined || str === null) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function cellOrDash(val) {
    const v = (val || '').toString().trim();
    return v ? escapeHtml(v) : '<span class="empty-cell">—</span>';
  }

  function loadData() {
    resultsEl.innerHTML = '<div class="loading">Loading data...</div>';
    fetch(SCRIPT_URL)
      .then(res => res.json())
      .then(result => {
        if (result.status === 'success') {
          allData = result.data || [];
          dataLoaded = true;
          renderForSelectedTeam();
        } else {
          resultsEl.innerHTML = '<div class="empty-msg">Could not load data: ' + escapeHtml(result.message || 'Unknown error') + '</div>';
        }
      })
      .catch(err => {
        resultsEl.innerHTML = '<div class="empty-msg">Could not connect to the Sheet. Please check your internet connection.</div>';
        console.error(err);
      });
  }

  // Build one decision cell (Accept/Reject + comment + Save)
  function buildDecisionCell(row, field) {
    const existingStatus = (row[field + '_status'] || '').trim();
    const existingComment = (row[field + '_mgrComment'] || '').trim();

    const td = document.createElement('td');
    td.className = 'decision-cell';

    const btnGroup = document.createElement('div');
    btnGroup.className = 'btn-group';

    const btnAccept = document.createElement('button');
    btnAccept.className = 'btn-accept' + (existingStatus === 'Accepted' ? ' active' : '');
    btnAccept.textContent = '✓ Accept';

    const btnReject = document.createElement('button');
    btnReject.className = 'btn-reject' + (existingStatus === 'Rejected' ? ' active' : '');
    btnReject.textContent = '✗ Reject';

    btnGroup.appendChild(btnAccept);
    btnGroup.appendChild(btnReject);

    const commentInput = document.createElement('textarea');
    commentInput.className = 'mgr-comment-input';
    commentInput.placeholder = 'Manager comment...';
    commentInput.value = existingComment;
    commentInput.rows = 1;

    const saveBtn = document.createElement('button');
    saveBtn.className = 'save-btn';
    saveBtn.textContent = 'Save';

    const statusEl = document.createElement('div');
    statusEl.className = 'decision-status';
    if (existingStatus === 'Accepted') {
      statusEl.classList.add('accepted');
      statusEl.textContent = '✓ Accepted';
    } else if (existingStatus === 'Rejected') {
      statusEl.classList.add('rejected');
      statusEl.textContent = '✗ Rejected';
    }

    let currentStatus = existingStatus;

    btnAccept.addEventListener('click', () => {
      currentStatus = 'Accepted';
      btnAccept.classList.add('active');
      btnReject.classList.remove('active');
    });

    btnReject.addEventListener('click', () => {
      currentStatus = 'Rejected';
      btnReject.classList.add('active');
      btnAccept.classList.remove('active');
    });

    saveBtn.addEventListener('click', () => {
      if (!currentStatus) {
        statusEl.className = 'decision-status saving';
        statusEl.textContent = 'Please choose Accept or Reject first.';
        return;
      }

      saveBtn.disabled = true;
      btnAccept.disabled = true;
      btnReject.disabled = true;
      statusEl.className = 'decision-status saving';
      statusEl.textContent = 'Saving...';

      const payload = {
        action: 'updateDecision',
        rowId: row.rowId,
        field: field,
        status: currentStatus,
        mgrComment: commentInput.value
      };

      fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      })
        .then(res => res.json())
        .then(result => {
          saveBtn.disabled = false;
          btnAccept.disabled = false;
          btnReject.disabled = false;
          if (result.status === 'success') {
            statusEl.className = 'decision-status ' + (currentStatus === 'Accepted' ? 'accepted' : 'rejected');
            statusEl.textContent = currentStatus === 'Accepted' ? '✓ Accepted' : '✗ Rejected';
            // highlight the row
            const tr = td.closest('tr');
            if (tr) {
              tr.classList.remove('row-accepted', 'row-rejected');
              tr.classList.add(currentStatus === 'Accepted' ? 'row-accepted' : 'row-rejected');
            }
            // update local data
            row[field + '_status'] = currentStatus;
            row[field + '_mgrComment'] = commentInput.value;
          } else {
            statusEl.className = 'decision-status rejected';
            statusEl.textContent = 'Error: ' + (result.message || 'Could not save.');
          }
        })
        .catch(() => {
          saveBtn.disabled = false;
          btnAccept.disabled = false;
          btnReject.disabled = false;
          statusEl.className = 'decision-status rejected';
          statusEl.textContent = 'Network error. Please try again.';
        });
    });

    td.appendChild(btnGroup);
    td.appendChild(commentInput);
    td.appendChild(saveBtn);
    td.appendChild(statusEl);

    return td;
  }

  function buildRow(row, quarter, kpiField, commentField) {
    const tr = document.createElement('tr');

    const existingStatus = (row[kpiField + '_status'] || '').trim();
    if (existingStatus === 'Accepted') tr.classList.add('row-accepted');
    if (existingStatus === 'Rejected') tr.classList.add('row-rejected');

    tr.innerHTML = `
      <td class="row-label">${quarter}</td>
      <td>${cellOrDash(row[kpiField])}</td>
      <td>${cellOrDash(row[commentField])}</td>
    `;

    tr.appendChild(buildDecisionCell(row, kpiField));
    return tr;
  }

  function renderForSelectedTeam() {
    const team = teamFilter.value;
    if (!team) { resultsEl.innerHTML = ''; return; }
    if (!dataLoaded) { resultsEl.innerHTML = '<div class="loading">Loading data...</div>'; return; }

    const teamEntries = allData.filter(row => (row.teamName || '').trim() === team);

    if (teamEntries.length === 0) {
      resultsEl.innerHTML = '<div class="empty-msg">No submissions yet for this team.</div>';
      return;
    }

    const list = document.createElement('div');
    list.className = 'emp-list';

    teamEntries.forEach((row, idx) => {
      const empCard = document.createElement('div');
      empCard.className = 'emp-card';

      // Header
      const head = document.createElement('div');
      head.className = 'emp-head';
      head.innerHTML = `
        <div class="emp-head-left">
          <div class="emp-name">${escapeHtml(row.name || 'Unnamed')}</div>
          <div class="emp-desig">${escapeHtml(row.designation || '')}</div>
        </div>
        <div class="emp-arrow" id="arrow-${idx}">&#9660;</div>
      `;

      // Body
      const body = document.createElement('div');
      body.className = 'emp-body';

      const meta = document.createElement('div');
      meta.className = 'emp-meta';
      meta.textContent = 'Submitted: ' + (row.timestamp || '');
      body.appendChild(meta);

      // KPI table
      const kpiTitle = document.createElement('div');
      kpiTitle.className = 'table-title';
      kpiTitle.textContent = 'KPI Tracking';
      body.appendChild(kpiTitle);

      const kpiTable = document.createElement('table');
      kpiTable.className = 'kpi-table';
      kpiTable.innerHTML = `<tr><th>Quarter</th><th>Accounts / Tasks / KPI</th><th>Comment</th><th>Manager Decision</th></tr>`;
      kpiTable.appendChild(buildRow(row, 'Q1', 'kpiQ1', 'kpiQ1Comment'));
      kpiTable.appendChild(buildRow(row, 'Q2', 'kpiQ2', 'kpiQ2Comment'));
      kpiTable.appendChild(buildRow(row, 'Q3', 'kpiQ3', 'kpiQ3Comment'));
      kpiTable.appendChild(buildRow(row, 'Q4', 'kpiQ4', 'kpiQ4Comment'));
      body.appendChild(kpiTable);

      // Init table
      const initTitle = document.createElement('div');
      initTitle.className = 'table-title';
      initTitle.style.marginTop = '20px';
      initTitle.textContent = 'Commitment & Development';
      body.appendChild(initTitle);

      const initTable = document.createElement('table');
      initTable.className = 'kpi-table';
      initTable.innerHTML = `<tr><th>Quarter</th><th>Initiative</th><th>Comment</th><th>Manager Decision</th></tr>`;
      initTable.appendChild(buildRow(row, 'Q1', 'initQ1', 'initQ1Comment'));
      initTable.appendChild(buildRow(row, 'Q2', 'initQ2', 'initQ2Comment'));
      initTable.appendChild(buildRow(row, 'Q3', 'initQ3', 'initQ3Comment'));
      initTable.appendChild(buildRow(row, 'Q4', 'initQ4', 'initQ4Comment'));
      body.appendChild(initTable);

      empCard.appendChild(head);
      empCard.appendChild(body);
      list.appendChild(empCard);

      // Toggle
      const arrow = head.querySelector(`#arrow-${idx}`);
      head.addEventListener('click', () => {
        body.classList.toggle('open');
        arrow.classList.toggle('open');
      });
    });

    resultsEl.innerHTML = '';
    resultsEl.appendChild(list);
  }

  teamFilter.addEventListener('change', renderForSelectedTeam);
  loadData();
</script>

</body>
</html>
