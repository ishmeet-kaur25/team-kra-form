<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team KRA Submission</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fa;
    --bg-panel: #ffffff;
    --bg-panel-2: #eef1f7;
    --cyan: #0a8fa8;
    --cyan-dim: #4fb8cc;
    --cyan-glow: rgba(10, 143, 168, 0.18);
    --magenta: #d6206e;
    --text: #1c2733;
    --text-dim: #67768a;
    --border: #d8dee8;
    --danger: #d6294a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      linear-gradient(rgba(10,143,168,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,143,168,0.05) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 32px 16px 80px;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .eyebrow {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: 0.35em;
    font-size: 12px;
    color: var(--magenta);
  }

  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: 0.04em;
    margin: 8px 0 6px;
    color: var(--cyan);
  }

  .sub {
    color: var(--text-dim);
    font-size: 13px;
  }

  .card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 22px 22px 26px;
    margin-bottom: 20px;
    position: relative;
    box-shadow: 0 2px 10px rgba(20,30,50,0.06);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), transparent 70%);
    opacity: 0.5;
  }

  label {
    display: block;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="text"],
  input[type="number"],
  textarea {
    width: 100%;
    background: #fbfcfe;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input::placeholder, textarea::placeholder {
    color: #a3afc0;
  }

  input:focus, textarea:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(10,143,168,0.12);
  }

  textarea {
    min-height: 70px;
    resize: vertical;
  }

  .field {
    margin-bottom: 16px;
  }
  .field:last-child { margin-bottom: 0; }

  .field-row {
    display: flex;
    gap: 14px;
    margin-bottom: 16px;
  }
  .field-row .field {
    flex: 1;
    margin-bottom: 0;
  }
  @media (max-width: 480px) {
    .field-row { flex-direction: column; gap: 16px; }
  }

  .kra-group {
    border-left: 2px solid var(--cyan-dim);
    padding-left: 14px;
    margin-bottom: 0;
  }

  .kra-group-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text);
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.8;
  }

  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--cyan), #066a7d);
    border: none;
    color: #ffffff;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 16px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 4px 14px var(--cyan-glow);
    transition: transform 0.1s, box-shadow 0.15s;
  }
  .submit-btn:hover {
    box-shadow: 0 6px 18px var(--cyan-glow);
    transform: translateY(-1px);
  }
  .submit-btn:active { transform: translateY(0); }

  .hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 14px;
  }

  #status-banner {
    display: none;
    background: rgba(10,143,168,0.08);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 14px 18px;
    border-radius: 6px;
    margin-bottom: 24px;
    font-size: 13px;
    text-align: center;
  }

  @media (max-width: 480px) {
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="eyebrow">// PERFORMANCE TRACKING</div>
    <h1>TEAM KRA SUBMISSION</h1>
    <div class="sub">Fill in your team and designation details below.</div>
  </header>

  <div id="status-banner"></div>

  <form id="kra-form">
    <div class="card">
      <div class="field">
        <label for="teamName">Team Name</label>
        <input type="text" id="teamName" placeholder="e.g. Alchemy PMS Squad" required>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="empName">Name</label>
          <input type="text" id="empName" placeholder="e.g. Priya Sharma" required>
        </div>
        <div class="field">
          <label for="designation">Designation</label>
          <input type="text" id="designation" placeholder="e.g. Delivery Manager" required>
        </div>
      </div>

      <div class="kra-group">
        <div class="kra-group-title">Quarterly KRA</div>
        <div class="field">
          <textarea id="quarterlyKra" placeholder="Quarterly KRA..."></textarea>
        </div>
        <div class="field">
          <label>Comment</label>
          <textarea id="quarterlyComment" placeholder="Comment..."></textarea>
        </div>
      </div>
    </div>

    <button type="submit" class="submit-btn">Submit</button>
    <div class="hint">Fill in your details and submit. You can submit again for another entry anytime.</div>
  </form>
</div>

<script>
  // Google Apps Script Web App URL — receives submissions and writes them to the Sheet
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaPD4ck4GSKtJzndAdxFRfWDz0uisUcwn9GoPxJgphn0y8AjCOoYebx3OJgn17ddRK/exec';

  document.getElementById('kra-form').addEventListener('submit', function (e) {
    e.preventDefault();

    const data = {
      teamName: document.getElementById('teamName').value,
      name: document.getElementById('empName').value,
      designation: document.getElementById('designation').value,
      quarterlyKra: document.getElementById('quarterlyKra').value,
      quarterlyComment: document.getElementById('quarterlyComment').value
    };

    const banner = document.getElementById('status-banner');
    banner.style.display = 'block';
    banner.style.borderColor = 'var(--cyan)';
    banner.style.color = 'var(--cyan)';
    banner.textContent = 'Submitting...';
    banner.scrollIntoView({ behavior: 'smooth', block: 'center' });

    const submitBtn = document.querySelector('.submit-btn');
    submitBtn.disabled = true;

    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(data)
    })
      .then(res => res.json())
      .then(result => {
        submitBtn.disabled = false;
        if (result.status === 'success') {
          banner.textContent = '✓ Submitted successfully! Your response has been recorded.';
          document.getElementById('kra-form').reset();
        } else {
          banner.style.borderColor = 'var(--danger)';
          banner.style.color = 'var(--danger)';
          banner.textContent = '✕ Something went wrong: ' + (result.message || 'Unknown error. Please try again.');
        }
      })
      .catch(err => {
        submitBtn.disabled = false;
        banner.style.borderColor = 'var(--danger)';
        banner.style.color = 'var(--danger)';
        banner.textContent = '✕ Could not submit. Please check your internet connection and try again.';
        console.error('Submit error:', err);
      });
  });
</script>

</body>
</html>
