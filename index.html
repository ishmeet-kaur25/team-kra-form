<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team KRA Submission</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg-panel: #0f1525;
    --bg-panel-2: #131b30;
    --cyan: #2de2ff;
    --cyan-dim: #1a8fa8;
    --cyan-glow: rgba(45, 226, 255, 0.35);
    --magenta: #ff3da6;
    --text: #d6f6ff;
    --text-dim: #6f89a3;
    --border: #1f3050;
    --danger: #ff4d6d;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      linear-gradient(rgba(45,226,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(45,226,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 32px 16px 80px;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .eyebrow {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: 0.35em;
    font-size: 12px;
    color: var(--magenta);
    text-shadow: 0 0 8px rgba(255,61,166,0.5);
  }

  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: 0.04em;
    margin: 8px 0 6px;
    color: var(--cyan);
    text-shadow: 0 0 14px var(--cyan-glow);
  }

  .sub {
    color: var(--text-dim);
    font-size: 13px;
  }

  .card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 22px 22px 26px;
    margin-bottom: 20px;
    position: relative;
    box-shadow: 0 0 0 1px rgba(45,226,255,0.03), 0 8px 24px rgba(0,0,0,0.4);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), transparent 70%);
    opacity: 0.6;
  }

  label {
    display: block;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="text"],
  input[type="number"],
  textarea {
    width: 100%;
    background: #060a14;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input::placeholder, textarea::placeholder {
    color: #3c4f6b;
  }

  input:focus, textarea:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(45,226,255,0.12);
  }

  textarea {
    min-height: 70px;
    resize: vertical;
  }

  .field {
    margin-bottom: 16px;
  }
  .field:last-child { margin-bottom: 0; }

  /* Designation block */
  .desig-block {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .desig-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
    background: var(--bg-panel-2);
  }

  .desig-head-left {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  .desig-tag {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--magenta);
    background: rgba(255,61,166,0.1);
    border: 1px solid rgba(255,61,166,0.3);
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .desig-name-display {
    color: var(--text-dim);
    font-size: 13px;
  }

  .desig-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .toggle-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--cyan);
    width: 28px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .toggle-btn:hover { background: rgba(45,226,255,0.1); }

  .remove-btn {
    background: none;
    border: 1px solid rgba(255,77,109,0.4);
    color: var(--danger);
    width: 28px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .remove-btn:hover { background: rgba(255,77,109,0.12); }

  .desig-body {
    padding: 20px 18px;
    border-top: 1px solid var(--border);
  }

  .desig-body.collapsed {
    display: none;
  }

  .kra-group {
    border-left: 2px solid var(--cyan-dim);
    padding-left: 14px;
    margin-bottom: 18px;
  }
  .kra-group:last-child { margin-bottom: 0; }

  .kra-group-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text);
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.85;
  }

  /* Add button */
  .add-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--cyan-dim);
    color: var(--cyan);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.06em;
    padding: 14px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    margin-bottom: 28px;
  }
  .add-btn:hover {
    background: rgba(45,226,255,0.06);
    border-color: var(--cyan);
    box-shadow: 0 0 18px rgba(45,226,255,0.15);
  }
  .add-btn .plus {
    font-size: 18px;
    line-height: 1;
  }

  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.08em;
    color: var(--magenta);
    text-transform: uppercase;
    margin: 32px 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--cyan), #1a8fa8);
    border: none;
    color: #04101a;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 16px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 0 24px var(--cyan-glow);
    transition: transform 0.1s, box-shadow 0.15s;
  }
  .submit-btn:hover {
    box-shadow: 0 0 32px var(--cyan-glow);
    transform: translateY(-1px);
  }
  .submit-btn:active { transform: translateY(0); }

  .hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 14px;
  }

  #status-banner {
    display: none;
    background: rgba(45,226,255,0.08);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 14px 18px;
    border-radius: 6px;
    margin-bottom: 24px;
    font-size: 13px;
    text-align: center;
  }

  @media (max-width: 480px) {
    h1 { font-size: 24px; }
    .desig-head { padding: 12px 14px; }
    .desig-body { padding: 16px 14px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="eyebrow">// PERFORMANCE TRACKING</div>
    <h1>TEAM KRA SUBMISSION</h1>
    <div class="sub">Fill in team details, then add each designation with its KRAs.</div>
  </header>

  <div id="status-banner"></div>

  <form id="kra-form">
    <div class="card">
      <div class="field">
        <label for="teamName">Team Name</label>
        <input type="text" id="teamName" placeholder="e.g. Alchemy PMS Squad" required>
      </div>
      <div class="field">
        <label for="teamSize">No. of People in Team</label>
        <input type="number" id="teamSize" min="1" placeholder="e.g. 6" required>
      </div>
    </div>

    <div class="section-title">Designations</div>
    <div id="desig-container"></div>

    <button type="button" class="add-btn" id="add-desig-btn">
      <span class="plus">+</span> Add Designation
    </button>

    <div class="section-title">Full Team KRA</div>
    <div class="card">
      <div class="field">
        <label for="fullTeamKra">Full Team KRA</label>
        <textarea id="fullTeamKra" placeholder="Describe the overall team KRA..."></textarea>
      </div>
      <div class="field">
        <label for="fullTeamComment">Comment</label>
        <textarea id="fullTeamComment" placeholder="Any additional comment..."></textarea>
      </div>
    </div>

    <button type="submit" class="submit-btn">Submit</button>
    <div class="hint">Click "Add Designation" to add as many roles as needed — each opens with its own 1-Month, Quarterly, and Yearly KRA fields.</div>
  </form>
</div>

<script>
  let desigCount = 0;
  const container = document.getElementById('desig-container');

  function addDesignationBlock() {
    desigCount += 1;
    const id = desigCount;

    const block = document.createElement('div');
    block.className = 'desig-block';
    block.dataset.id = id;
    block.innerHTML = `
      <div class="desig-head" data-toggle="${id}">
        <div class="desig-head-left">
          <span class="desig-tag">ROLE ${id}</span>
          <span class="desig-name-display" data-display="${id}">New designation</span>
        </div>
        <div class="desig-controls">
          <button type="button" class="toggle-btn" data-toggle-btn="${id}">&#9660;</button>
          <button type="button" class="remove-btn" data-remove="${id}">&#10005;</button>
        </div>
      </div>
      <div class="desig-body" data-body="${id}">
        <div class="field">
          <label>Designation</label>
          <input type="text" placeholder="e.g. Delivery Manager" data-desig-input="${id}">
        </div>

        <div class="kra-group">
          <div class="kra-group-title">One Month KRA</div>
          <div class="field">
            <textarea placeholder="One month KRA..."></textarea>
          </div>
          <div class="field">
            <label>Comment</label>
            <textarea placeholder="Comment..."></textarea>
          </div>
        </div>

        <div class="kra-group">
          <div class="kra-group-title">Quarterly KRA</div>
          <div class="field">
            <textarea placeholder="Quarterly KRA..."></textarea>
          </div>
          <div class="field">
            <label>Comment</label>
            <textarea placeholder="Comment..."></textarea>
          </div>
        </div>

        <div class="kra-group">
          <div class="kra-group-title">One Year KRA</div>
          <div class="field">
            <textarea placeholder="One year KRA..."></textarea>
          </div>
          <div class="field">
            <label>Comment</label>
            <textarea placeholder="Comment..."></textarea>
          </div>
        </div>
      </div>
    `;
    container.appendChild(block);

    // Wire up toggle (collapse/expand)
    const head = block.querySelector(`[data-toggle="${id}"]`);
    const toggleBtn = block.querySelector(`[data-toggle-btn="${id}"]`);
    const body = block.querySelector(`[data-body="${id}"]`);

    function toggle() {
      const collapsed = body.classList.toggle('collapsed');
      toggleBtn.innerHTML = collapsed ? '&#9650;' : '&#9660;';
    }
    head.addEventListener('click', (e) => {
      if (e.target.closest('[data-remove]')) return;
      toggle();
    });

    // Wire up remove
    block.querySelector(`[data-remove="${id}"]`).addEventListener('click', () => {
      block.remove();
    });

    // Live update the designation name shown in the header
    const desigInput = block.querySelector(`[data-desig-input="${id}"]`);
    const display = block.querySelector(`[data-display="${id}"]`);
    desigInput.addEventListener('input', () => {
      display.textContent = desigInput.value.trim() || 'New designation';
    });
  }

  document.getElementById('add-desig-btn').addEventListener('click', addDesignationBlock);

  // Start with one block already open
  addDesignationBlock();

  // Google Apps Script Web App URL — receives submissions and writes them to the Sheet
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaPD4ck4GSKtJzndAdxFRfWDz0uisUcwn9GoPxJgphn0y8AjCOoYebx3OJgn17ddRK/exec';

  document.getElementById('kra-form').addEventListener('submit', function (e) {
    e.preventDefault();

    const data = {
      teamName: document.getElementById('teamName').value,
      teamSize: document.getElementById('teamSize').value,
      designations: [],
      fullTeamKra: document.getElementById('fullTeamKra').value,
      fullTeamComment: document.getElementById('fullTeamComment').value
    };

    document.querySelectorAll('.desig-block').forEach(block => {
      const textareas = block.querySelectorAll('textarea');
      data.designations.push({
        designation: block.querySelector('[data-desig-input]').value,
        oneMonthKra: textareas[0].value,
        oneMonthComment: textareas[1].value,
        quarterlyKra: textareas[2].value,
        quarterlyComment: textareas[3].value,
        oneYearKra: textareas[4].value,
        oneYearComment: textareas[5].value
      });
    });

    const banner = document.getElementById('status-banner');
    banner.style.display = 'block';
    banner.style.borderColor = 'var(--cyan)';
    banner.style.color = 'var(--cyan)';
    banner.textContent = 'Submitting...';
    banner.scrollIntoView({ behavior: 'smooth', block: 'center' });

    const submitBtn = document.querySelector('.submit-btn');
    submitBtn.disabled = true;

    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(data)
    })
      .then(res => res.json())
      .then(result => {
        submitBtn.disabled = false;
        if (result.status === 'success') {
          banner.textContent = '✓ Submitted successfully! Your response has been recorded.';
          document.getElementById('kra-form').reset();
          document.getElementById('desig-container').innerHTML = '';
          desigCount = 0;
          addDesignationBlock();
        } else {
          banner.style.borderColor = 'var(--danger)';
          banner.style.color = 'var(--danger)';
          banner.textContent = '✕ Something went wrong: ' + (result.message || 'Unknown error. Please try again.');
        }
      })
      .catch(err => {
        submitBtn.disabled = false;
        banner.style.borderColor = 'var(--danger)';
        banner.style.color = 'var(--danger)';
        banner.textContent = '✕ Could not submit. Please check your internet connection and try again.';
        console.error('Submit error:', err);
      });
  });
</script>

</body>
</html>
